version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker-production/app/Dockerfile
    container_name: dainsys-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./php/production.ini:/usr/local/etc/php/conf.d/production.ini
    depends_on:
      - mysql
      - redis
    networks:
      - dainsys-filament

  nginx:
    image: nginx:stable-alpine
    container_name: dainsys-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dainsys-filament

  mysql:
    image: mysql:8.0
    container_name: dainsys-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dainsys
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: dainsys
      MYSQL_PASSWORD: dainpassword
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dainsys-filament

  redis:
    image: redis:alpine
    container_name: dainsys-redis
    restart: unless-stopped
    networks:
      - dainsys-filament
  queue:
    build:
      context: ..
      dockerfile: docker-production/app/Dockerfile
    command: php artisan queue:work --sleep=3 --tries=3
    networks:
      - dainsys-filament

networks:
  dainsys-filament:
    driver: bridge

volumes:
  mysql-data:
